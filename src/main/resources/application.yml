# =========================================
# 몽글픽 백엔드 애플리케이션 설정
# =========================================
# Spring Boot 4.0.3 / Java 21 기반
# JWT 인증 + FastAPI AI Agent 프록시 구조

spring:
  application:
    name: monglepick-backend

  # -----------------------------------------
  # MySQL 데이터소스 설정
  # -----------------------------------------
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:monglepick}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:monglepick}
    password: ${DB_PASSWORD:monglepick}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 커넥션 풀 최대 크기
      maximum-pool-size: 20
      # 커넥션 최소 유휴 수
      minimum-idle: 5
      # 커넥션 타임아웃 (30초)
      connection-timeout: 30000
      # 유휴 커넥션 유지 시간 (10분)
      idle-timeout: 600000
      # 커넥션 최대 수명 (30분)
      max-lifetime: 1800000

  # -----------------------------------------
  # JPA / Hibernate 설정
  # -----------------------------------------
  jpa:
    # DDL 자동 생성 비활성화 (운영 환경에서는 validate 사용)
    hibernate:
      ddl-auto: validate
    # SQL 로그 비활성화 (디버깅 시 true로 변경)
    show-sql: false
    properties:
      hibernate:
        # MySQL 8 방언 설정
        dialect: org.hibernate.dialect.MySQLDialect
        # 배치 INSERT 최적화 (50건 단위)
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        # 지연 로딩 시 세션 외부 접근 방지
        enable_lazy_load_no_trans: false
    # DDL 스크립트 초기화 비활성화
    defer-datasource-initialization: false

  # -----------------------------------------
  # Jackson JSON 설정
  # -----------------------------------------
  jackson:
    # 날짜 포맷: ISO 8601
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul
    # 알 수 없는 프로퍼티 무시
    deserialization:
      fail-on-unknown-properties: false

# -----------------------------------------
# 서버 설정
# -----------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# -----------------------------------------
# JWT 인증 설정
# -----------------------------------------
jwt:
  # JWT 서명 비밀키 (운영 환경에서는 반드시 환경변수로 주입)
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
  # 액세스 토큰 만료 시간 (밀리초, 기본 1시간)
  expiration: ${JWT_EXPIRATION:3600000}
  # 리프레시 토큰 만료 시간 (밀리초, 기본 7일)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# -----------------------------------------
# AI Agent (FastAPI) 연동 설정
# -----------------------------------------
ai:
  agent:
    # FastAPI AI Agent 서버 기본 URL
    base-url: ${AI_AGENT_BASE_URL:http://localhost:8000}
    # 서비스 간 인증 키 (X-Service-Key 헤더로 전송)
    service-key: ${AI_AGENT_SERVICE_KEY:your-service-key-change-in-production}
    # AI Agent 호출 타임아웃 (초)
    timeout: ${AI_AGENT_TIMEOUT:60}

# -----------------------------------------
# 추천 서비스 (monglepick-recommend, FastAPI) 연동 설정
# -----------------------------------------
# ※ 검색/추천 기능은 정한나의 monglepick-recommend 프로젝트로 이관되었습니다.
# 키워드 검색, 하이브리드 검색, AI 추천 등은 이 서비스를 통해 수행됩니다.
recommend-service:
  base-url: ${RECOMMEND_SERVICE_BASE_URL:http://localhost:8001}

# -----------------------------------------
# 로깅 설정
# -----------------------------------------
logging:
  level:
    # 루트 로그 레벨
    root: INFO
    # 애플리케이션 로그 레벨
    com.monglepick.monglepickbackend: DEBUG
    # JPA SQL 로그 (디버깅 시 DEBUG로 변경)
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    # 콘솔 로그 포맷
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# -----------------------------------------
# CORS 허용 오리진 설정
# -----------------------------------------
cors:
  # 프론트엔드 허용 도메인 목록 (쉼표 구분)
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  # 허용 HTTP 메서드
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  # 허용 헤더
  allowed-headers: "*"
  # 자격증명 허용 (쿠키, Authorization 헤더)
  allow-credentials: true
  # preflight 캐시 시간 (초)
  max-age: 3600
